
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trading Desk</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap');

        :root {
            color-scheme: dark;
            --scrollbar-size: 10px;
            --scrollbar-track: #0b0f14;
            --scrollbar-track-border: rgba(255, 255, 255, 0.06);
            --scrollbar-thumb: linear-gradient(180deg, #3a4654 0%, #6c7a89 100%);
            --scrollbar-thumb-hover: linear-gradient(180deg, #5d6b7a 0%, #8a97a5 100%);
        }

        * {
            scrollbar-width: thin;
            scrollbar-color: #6c7a89 #0b0f14;
        }

        *::-webkit-scrollbar {
            width: var(--scrollbar-size);
            height: var(--scrollbar-size);
        }

        *::-webkit-scrollbar-track {
            background: var(--scrollbar-track);
            border-left: 1px solid var(--scrollbar-track-border);
            border-radius: 999px;
        }

        *::-webkit-scrollbar-thumb {
            background: var(--scrollbar-thumb);
            border: 2px solid var(--scrollbar-track);
            border-radius: 999px;
            min-height: 44px;
            box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.08);
        }

        *::-webkit-scrollbar-thumb:hover {
            background: var(--scrollbar-thumb-hover);
        }

        *::-webkit-scrollbar-corner {
            background: var(--scrollbar-track);
        }

        body {
            font-family: 'Inter', 'Noto Sans SC', sans-serif;
            background-color: #05070a;
        }
    </style>
